name: DRIP CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Format & Static Analysis
  # ─────────────────────────────────────────────
  analyze:
    name: Format & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Dart format check
        run: melos run format:check --scope="drip_*"

      - name: Static analysis (fatal-infos + fatal-warnings)
        run: melos run analyze --scope="drip_*"

  # ─────────────────────────────────────────────
  # Job 2: Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests · Released Packages
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run tests with coverage
        run: melos run test:coverage --no-private

      - name: Upload coverage
        uses: codecov/codecov-action@v4

  # ─────────────────────────────────────────────
  # Job 3: Publish dry-run (push only)
  # ─────────────────────────────────────────────
  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Dry-run publish for all packages
        run: melos run publish:dry --no-private
