name: DRIP CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.35.2'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Format & Static Analysis
  # ─────────────────────────────────────────────
  analyze:
    name: Format & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read        # least-privilege: read source only
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # never expose GITHUB_TOKEN to steps

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Check format (drip_core)
        run: dart format --output=none --set-exit-if-changed packages/drip_core

      - name: Check format (drip_flutter)
        run: dart format --output=none --set-exit-if-changed packages/drip_flutter

      - name: Analyze drip_core
        run: |
          cd packages/drip_core
          dart analyze --fatal-infos --fatal-warnings

      - name: Analyze drip_flutter
        run: |
          cd packages/drip_flutter
          flutter analyze --fatal-infos --fatal-warnings

  # ─────────────────────────────────────────────
  # Job 2: Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests · Released Packages
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run tests (drip_core)
        run: |
          cd packages/drip_core
          dart test --coverage=coverage

      - name: Check coverage threshold (drip_core)
        run: |
          cd packages/drip_core
          dart run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib
          dart run tool/check_coverage.dart

      - name: Run tests (drip_flutter)
        run: |
          cd packages/drip_flutter
          flutter test --coverage

      - name: Check coverage threshold (drip_flutter)
        run: |
          cd packages/drip_flutter
          if [ -f tool/check_coverage.dart ]; then
            dart run tool/check_coverage.dart
          else
            echo "Skipping drip_flutter coverage threshold until the drip_flutter API-freeze PR adds tool/check_coverage.dart."
          fi

      - name: Run benchmark regression tests (drip_core)
        env:
          # GitHub-hosted runners vary enough that the local 10M writes/sec
          # release claim is too noisy as a CI hard gate. CI still fails on
          # major regressions while the benchmark keeps reporting the measured
          # throughput on every PR.
          DRIP_MIN_WRITE_THROUGHPUT: '5000000'
        run: |
          cd packages/drip_core
          dart run benchmark/write_throughput.dart
          dart run benchmark/diamond_correctness.dart
          dart run benchmark/propagation_scaling.dart
          dart run benchmark/scope_disposal.dart

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # ─────────────────────────────────────────────
  # Job 3: Publish dry-run (push only)
  # ─────────────────────────────────────────────
  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Dry-run publish for all packages
        run: melos run publish:dry --no-select
