name: DRIP CI

on:
  pull_request:
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Format & Static Analysis
  # ─────────────────────────────────────────────
  analyze:
    name: Format & Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read        # least-privilege: read source only
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # never expose GITHUB_TOKEN to steps

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        # Pin to a specific version so supply-chain attacks cannot inject code
        # via a compromised "latest" tag.
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Dart format check
        run: melos run format:check --no-select

      - name: Static analysis (fatal-infos + fatal-warnings)
        run: melos run analyze --no-select

  # ─────────────────────────────────────────────
  # Job 2: Tests
  # ─────────────────────────────────────────────
  test:
    name: Tests · Released Packages
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run tests with coverage
        run: melos run test:coverage --no-select

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          # Fail the step if upload fails so coverage gaps are never silently missed.
          fail_ci_if_error: true

  # ─────────────────────────────────────────────
  # Job 3: Publish dry-run (push only)
  # ─────────────────────────────────────────────
  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Flutter via FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Melos
        run: dart pub global activate melos 6.3.2

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Dry-run publish for all packages
        run: melos run publish:dry --no-select
