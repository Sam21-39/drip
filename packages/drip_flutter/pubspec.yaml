name: drip_flutter
description: "Flutter reactive render binding for DripState, enabling zero-rebuild UI updates through direct RenderObject synchronization."
version: 0.7.1-alpha
homepage: https://github.com/Sam21-39/drip
repository: https://github.com/Sam21-39/drip
issue_tracker: https://github.com/Sam21-39/drip/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  drip_core: ^1.0.0
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

topics:
  - state-management
  - reactive
  - flutter
  - rendering
  - performance

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

screenshots:
  - description: >
      1000-cell live grid updating at 60fps with zero widget rebuilds.
      Flutter DevTools shows 0 build() calls during continuous state updates.
    path: screenshots/demo_grid.png
